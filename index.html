<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#07110f" />
<title>Oslo → Poznań Coach Center</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">OP</div><div><h1>Coach Center</h1><p>Oslo Marathon → Ironman 70.3 Poznań</p></div></div>
    <nav class="nav" id="sideNav"></nav>
    <div class="side-card">
      <h3>Readiness dzisiaj</h3>
      <div class="progress-ring" id="sideRing" style="--p:0%"><span id="sideScore">—</span></div>
      <p id="sideComment">Dane wykonania synchronizują się automatycznie z Intervals.icu</p>
    </div>
    <div class="side-card"><h3>Dane lokalne</h3><p>Wpisy zapisują się w tej przeglądarce. Używaj eksportu JSON jako backupu.</p></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="title"><h2 id="pageTitle">Dashboard</h2><p id="pageSub">Profesjonalny panel kontroli treningu</p></div>
      <div class="actions"><button class="btn" id="themeBtn">☾ / ☀</button><button class="btn" onclick="window.print()">Drukuj</button><button class="btn primary" data-view="log">Dodaj RPE / notatkę</button></div>
    </header>

    <section class="view active" id="view-dashboard"></section>
    <section class="view" id="view-calendar"></section>
    <section class="view" id="view-plan"></section>
    <section class="view" id="view-log"></section>
    <section class="view" id="view-coach"></section>
    <section class="view" id="view-garmin"></section>
    <section class="view" id="view-backup"></section>
  </main>
</div>
<div class="mobile-nav"><nav class="nav" id="mobileNav"></nav></div>
<div class="modal" id="detailModal"><div class="modal-card"><div class="modal-head"><div><h3 id="modalTitle"></h3><p id="modalSub" style="color:var(--muted);margin:6px 0 0"></p></div><button class="close" onclick="closeModal()">×</button></div><div id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script src="data/plan.js?v=oslo-v2"></script>
  <script src="data/structured_workouts.js?v=oslo-v2"></script>
<script src="intervals-autofill-engine.js"></script>
<script src="app.js?v=oslo-v2"></script>
</body>
</html>
